# Two Bitcoin Core regtest nodes on host networking, a miner that produces
# one block every interval and writes hashes back to the hypervisor feedback
# buffer, and a shutdown trigger that issues bedrock's VMCALL after a sleep.
#
# All four images come from images.tar (built by ./build.sh) — never pulled.
# `image:` refs use bare names (no `docker.io/` registry prefix) so podman's
# fallback resolution finds the `localhost/...` tags it adds at load time.

services:
  bitcoind1:
    image: bitcoin/bitcoin:latest
    pull_policy: never
    container_name: bitcoind1
    network_mode: host
    command:
      - -regtest
      - -server
      - -rpcuser=user
      - -rpcpassword=password
      - -rpcallowip=0.0.0.0/0
      - -rpcbind=0.0.0.0
      - -rpcport=18443
      - -port=18444
      - -listen=1
      - -listenonion=0
      - -fallbackfee=0.0001
      - -printtoconsole
      - -debug
      - -debugexclude=libevent
      - -debugexclude=leveldb

  bitcoind2:
    image: bitcoin/bitcoin:latest
    pull_policy: never
    container_name: bitcoind2
    network_mode: host
    command:
      - -regtest
      - -server
      - -rpcuser=user
      - -rpcpassword=password
      - -rpcallowip=0.0.0.0/0
      - -rpcbind=0.0.0.0
      - -rpcport=18455
      - -port=18456
      - -listen=1
      - -listenonion=0
      - -fallbackfee=0.0001
      - -printtoconsole
      - -addnode=127.0.0.1:18444
      - -debug
      - -debugexclude=libevent
      - -debugexclude=leveldb
    depends_on:
      - bitcoind1

  miner:
    image: bedrock/bitcoin-miner:latest
    pull_policy: never
    container_name: miner
    network_mode: host
    privileged: true  # Required for VMCALL
    command: ["600"]  # Sleep interval in seconds (10 minutes)
    depends_on:
      - bitcoind1

  shutdown:
    image: bedrock/shutdown:latest
    pull_policy: never
    container_name: shutdown
    network_mode: host
    privileged: true  # Required for VMCALL
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Shutdown waiting 60 minutes before VMCALL..."
        sleep 3600
        echo "Initiating VM shutdown..."
        exec /usr/local/bin/bedrock-shutdown
    depends_on:
      - miner
