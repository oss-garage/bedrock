name: Nix

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build kernel module
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: cachix/cachix-action@v15
        with:
          name: bedrock
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - run: nix build .#bedrockModule
      - run: nix build .#check-stack

  clippy:
    name: Clippy (kernel module)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: cachix/cachix-action@v15
        with:
          name: bedrock
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - run: nix build .#clippy-kernel

  integration-test:
    name: Integration tests
    runs-on: runs-on=${{ github.run_id }}/runner=m7i-nested-virt
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/cachix-action@v15
        with:
          name: bedrock
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - run: ./workloads/bitcoin/build.sh
      - run: git add -f workloads/bitcoin/images.tar
      - run: sudo rmmod kvm-intel || true
      - run: sudo rmmod kvm || true
      - run: PATH="$HOME/.cargo/bin:/usr/lib/llvm-18/bin:$PATH" just build
      - run: sudo just load
      - run: sudo env "PATH=$PATH" nix run .#test-native
