name: Nix

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build kernel module
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: cachix/cachix-action@v15
        with:
          name: bedrock
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - run: nix build .#bedrockModule
      - run: nix build .#check-stack

  clippy:
    name: Clippy (kernel module)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: cachix/cachix-action@v15
        with:
          name: bedrock
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - run: nix build .#clippy-kernel

  integration-tests:
    name: "Integration tests [metal, bedrock-lab]"
    runs-on: runs-on=${{ github.run_id }}/runner=m7i-metal
    steps:
      - uses: actions/checkout@v4
      # The image only has the default Nix profile on PATH; cachix-action
      # installs cachix into the per-user profile, so add that to PATH too.
      - run: echo "$HOME/.nix-profile/bin" >> "$GITHUB_PATH"
      - uses: cachix/cachix-action@v15
        with:
          name: bedrock
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      # Stage the workload image so the flake can build its initrd (the flake
      # only sees git-tracked files; images.tar is gitignored).
      - run: ./workloads/integration-tests/build.sh
      - run: git add -f workloads/integration-tests/images.tar
      - run: sudo rmmod kvm-intel || true
      - run: sudo rmmod kvm || true
      - run: PATH="$HOME/.cargo/bin:/usr/lib/llvm-18/bin:$PATH" just build
      - run: sudo just load
      # Run the bedrock-lab integration suite. `nix run` builds the test binary
      # (and the workload initrd) hermetically — cargo runs in the nix sandbox,
      # not the runner's admin-owned ~/.cargo — then runs it against
      # /dev/bedrock.
      - run: nix run .#integration-tests -- --nocapture

  bitcoin:
    name: "Run bitcoin workload [nested-virt, bedrock-cli]"
    runs-on: runs-on=${{ github.run_id }}/runner=m7i-nested-virt
    steps:
      - uses: actions/checkout@v4
      # The image only has the default Nix profile on PATH; cachix-action
      # installs cachix into the per-user profile, so add that to PATH too.
      - run: echo "$HOME/.nix-profile/bin" >> "$GITHUB_PATH"
      - uses: cachix/cachix-action@v15
        with:
          name: bedrock
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - run: ./workloads/bitcoin/build.sh
      - run: git add -f workloads/bitcoin/images.tar
      - run: sudo rmmod kvm-intel || true
      - run: sudo rmmod kvm || true
      - run: PATH="$HOME/.cargo/bin:/usr/lib/llvm-18/bin:$PATH" just build
      - run: sudo just load
      - run: nix run .#test-bitcoin-workload
